<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>問題管理</title>
<link rel="stylesheet" href="style.css?v=20260707g" />
</head>
<body>
<header>
  <div class="header-inner">
    <h1>問題管理</h1>
    <div id="auth-area" class="auth-area"></div>
  </div>
</header>

<main id="app" hidden>
  <div class="tab-panel" data-tab-panel="home">
    <div id="summary" class="summary"></div>

    <section class="card" id="review-suggest" hidden>
      <h2>復習おすすめ</h2>
      <p class="section-note">正答率が低い単元・しばらく解いていない単元・まだ挑戦していない単元を優先して表示します。</p>
      <div id="review-suggest-list" class="suggest-list"></div>
    </section>
  </div>

  <div class="tab-panel" data-tab-panel="input" hidden>
    <section class="card">
      <h2>記録を追加</h2>
      <form id="record-form">
        <input type="hidden" id="record-id" />
        <div class="form-row">
          <label for="date">日付</label>
          <input type="date" id="date" required />
        </div>
        <div class="form-row">
          <label for="unit">単元名</label>
          <select id="unit" required></select>
        </div>
        <div class="form-row">
          <label for="page-number">ページ</label>
          <input type="number" id="page-number" min="1" required />
        </div>
        <div class="form-row">
          <label for="total">問題数</label>
          <input type="number" id="total" min="1" required />
        </div>
        <div class="form-row">
          <label for="correct">正解数</label>
          <input type="number" id="correct" min="0" required />
        </div>
        <div class="form-row">
          <label for="memo">メモ</label>
          <textarea id="memo" rows="2" placeholder="間違えた問題や気づいたことなど（任意）"></textarea>
        </div>
        <div class="form-row form-actions">
          <button type="submit" id="submit-btn">追加</button>
          <button type="button" id="cancel-edit" class="secondary" hidden>キャンセル</button>
        </div>
        <p id="form-error" class="error"></p>
      </form>
    </section>

  </div>

  <div class="tab-panel" data-tab-panel="records" hidden>
    <section class="card">
      <div class="card-header">
        <h2>解答記録</h2>
        <button type="button" id="export-csv" class="secondary">CSVで書き出し</button>
      </div>
      <div class="filters">
        <div class="form-row">
          <label for="filter-unit">単元で絞り込み</label>
          <select id="filter-unit">
            <option value="">すべて</option>
          </select>
        </div>
        <div class="form-row">
          <label for="filter-from">期間</label>
          <div class="date-range">
            <input type="date" id="filter-from" aria-label="開始日" />
            <span>〜</span>
            <input type="date" id="filter-to" aria-label="終了日" />
            <button type="button" id="filter-clear" class="link">クリア</button>
          </div>
        </div>
      </div>
      <div id="trend-chart" class="trend-chart" hidden></div>
      <div class="table-wrap">
        <table id="records-table">
          <thead>
            <tr>
              <th class="sortable" data-sort-key="date">日付</th>
              <th class="sortable" data-sort-key="unit">単元名</th>
              <th class="sortable" data-sort-key="pageNumber">ページ</th>
              <th>正解/問題数</th>
              <th class="sortable" data-sort-key="accuracy">正答率</th>
              <th>メモ</th>
              <th>記録者</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>

  <div class="tab-panel" data-tab-panel="units" hidden>
    <section class="card">
      <details class="collapsible">
        <summary>単元を追加</summary>
        <p class="section-note">問題集にない単元を追加できます。No.には他の単元と重ならない番号（そのページ番号など）を指定してください。</p>
        <form id="unit-form">
          <div class="form-row">
            <label for="new-unit-number">No.</label>
            <input type="number" id="new-unit-number" min="1" required />
          </div>
          <div class="form-row">
            <label for="new-unit-title">単元名</label>
            <input type="text" id="new-unit-title" maxlength="50" required />
          </div>
          <div class="form-row form-actions">
            <button type="submit">単元を追加</button>
          </div>
          <p id="unit-form-error" class="error"></p>
        </form>
      </details>
    </section>

    <section class="card">
      <h2>単元別の状況</h2>
      <div class="table-wrap">
        <table id="pages-table">
          <thead>
            <tr>
              <th class="sortable" data-sort-key="number">No.</th>
              <th class="sortable" data-sort-key="title">単元名</th>
              <th class="sortable" data-sort-key="status">状況</th>
              <th class="sortable" data-sort-key="attemptCount">挑戦回数</th>
              <th class="sortable" data-sort-key="lastDate">最終日</th>
              <th class="sortable" data-sort-key="accuracy">正答率</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>
</main>

<div id="signed-out" class="card signed-out-card">
  <p>このサービスは家族専用です。許可されたGoogleアカウントでログインしてください。</p>
</div>

<nav id="tab-bar" class="tab-bar" hidden>
  <button type="button" class="tab-btn active" data-tab="home">
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M9 21v-6h6v6"/></svg>
    ホーム
  </button>
  <button type="button" class="tab-btn" data-tab="input">
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
    記録する
  </button>
  <button type="button" class="tab-btn" data-tab="records">
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M8 11h8"/><path d="M8 15h8"/></svg>
    解答記録
  </button>
  <button type="button" class="tab-btn" data-tab="units">
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 4h6a4 4 0 0 1 4 4v13a3 3 0 0 0-3-3H2z"/><path d="M22 4h-6a4 4 0 0 0-4 4v13a3 3 0 0 1 3-3h7z"/></svg>
    単元
  </button>
</nav>

<script type="module" src="app.js?v=20260707g"></script>
</body>
</html>
